<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking — Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-box">

        <h2>🅿️ SmartPark</h2>
        <p>Your intelligent parking solution</p>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="showTab('login')">Login</button>
            <button class="auth-tab" onclick="showTab('register')">Register</button>
        </div>

        <!-- Alert -->
        <div class="alert" id="alert"></div>

        <!-- LOGIN FORM -->
        <div id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
        </div>

        <!-- REGISTER FORM -->
        <div id="register-form" style="display:none">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="register()">Create Account</button>
        </div>

    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
