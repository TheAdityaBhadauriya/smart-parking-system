<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark — Parking Map</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/map.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h1>🅿️ SmartPark</h1>
    <div>
        <span id="user-name">Welcome!</span>
        <a href="dashboard.html">Dashboard</a>
        <a href="bookings.html">My Bookings</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="container">

    <div class="page-title">🗺️ Parking Lot Map</div>
    <div class="page-subtitle">Visual overview of all parking slots — click a green slot to book</div>

    <!-- STATS BAR -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="number" id="total-slots">0</div>
            <div class="label">Total Slots</div>
        </div>
        <div class="stat-card">
            <div class="number" id="available-slots" style="color:#11998e">0</div>
            <div class="label">Available</div>
        </div>
        <div class="stat-card">
            <div class="number" id="occupied-slots" style="color:#eb3349">0</div>
            <div class="label">Occupied</div>
        </div>
    </div>

    <!-- FLOOR SWITCHER -->
    <div class="floor-switcher">
        <button class="floor-btn active" onclick="switchFloor(1)">Floor 1</button>
        <button class="floor-btn" onclick="switchFloor(2)">Floor 2</button>
    </div>

    <!-- LEGEND -->
    <div class="legend">
        <div class="legend-item"><div class="legend-dot available"></div> Available</div>
        <div class="legend-item"><div class="legend-dot occupied"></div> Occupied</div>
        <div class="legend-item"><div class="legend-dot ev"></div> EV Charging</div>
        <div class="legend-item"><div class="legend-dot disabled"></div> Disabled</div>
    </div>

    <!-- MAP -->
    <div class="map-wrapper">
        <div class="map-container" id="map-container">

            <!-- ENTRANCE -->
            <div class="entrance-marker">
                <div class="entrance-arrow">▼</div>
                <div class="entrance-label">ENTRANCE</div>
            </div>

            <!-- SLOTS RENDERED BY JS -->
            <div class="map-grid" id="map-grid"></div>

            <!-- LANE LABEL -->
            <div class="lane-label">◄ DRIVING LANE ►</div>

            <!-- EXIT -->
            <div class="exit-marker">
                <div class="exit-label">EXIT</div>
                <div class="exit-arrow">▼</div>
            </div>

        </div>
    </div>

</div>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="booking-modal">
    <div class="modal">
        <h3>Book Slot <span id="modal-slot-number"></span></h3>
        <p>Select your parking time</p>

        <div class="alert" id="modal-alert"></div>

        <div class="form-group">
            <label>Vehicle Number</label>
            <input type="text" id="vehicle-number" placeholder="e.g. UP32 AB 1234">
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" id="booking-date" min="">
        </div>
        <div class="form-group">
            <label>Start Time</label>
            <input type="time" id="start-time">
        </div>
        <div class="form-group">
            <label>End Time</label>
            <input type="time" id="end-time">
        </div>
        <div class="form-group">
            <label>Slot Type</label>
            <input type="text" id="modal-slot-type" disabled>
        </div>
        <div class="form-group">
            <label>Floor</label>
            <input type="text" id="modal-slot-floor" disabled>
        </div>

        <div class="modal-buttons">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-success" onclick="confirmBooking()">Confirm Booking</button>
        </div>
    </div>
</div>

<script src="/static/js/map.js"></script>
</body>
</html>
