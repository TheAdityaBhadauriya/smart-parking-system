<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark — My Bookings</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h1>🅿️ SmartPark</h1>
    <div>
        <span id="user-name">Welcome!</span>
        <a href="map.html">🗺️ Map View</a>
        <a href="bookings.html">My Bookings</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="container">

    <div class="page-title">My Bookings</div>
    <div class="page-subtitle">View and manage your parking bookings</div>

    <div class="alert" id="alert"></div>

    <div class="card">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Slot</th>
                        <th>Floor</th>
                        <th>Vehicle</th>
                        <th>Date</th>
                        <th>Time Slot</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bookings-table">
                    <tr>
                        <td colspan="8" style="text-align:center; color:#888; padding:30px">
                            Loading bookings...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/bookings.js"></script>
</body>
</html>
